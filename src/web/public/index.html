<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RrratCoder - AI Coding Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #ffffff;
      --bg-soft:     #f8f9fb;
      --bg-code:     #f4f5f7;
      --border:      #e4e7ec;
      --border-focus:#2563eb;
      --text:        #111827;
      --text-soft:   #6b7280;
      --text-faint:  #9ca3af;
      --blue:        #2563eb;
      --blue-bg:     #eff6ff;
      --green:       #16a34a;
      --green-bg:    #f0fdf4;
      --amber:       #d97706;
      --amber-bg:    #fffbeb;
      --red:         #dc2626;
      --red-bg:      #fef2f2;
      --purple:      #7c3aed;
      --purple-bg:   #f5f3ff;
      --font-ui:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-code:   'IBM Plex Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
      --radius:      10px;
      --radius-sm:   6px;
      --shadow-sm:   0 1px 2px rgba(0,0,0,.04);
      --shadow:      0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.03);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-ui);
      font-size:15px; color:var(--text); background:var(--bg);
      -webkit-font-smoothing:antialiased;
    }

    /* ====== TOP BAR ====== */
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 24px; border-bottom:1px solid var(--border);
      background:var(--bg); gap:16px; flex-wrap:wrap;
    }
    .topbar-left { display:flex; align-items:center; gap:14px; }
    .brand {
      font-family:var(--font-code); font-size:18px; font-weight:600;
      color:var(--text); letter-spacing:-0.02em; text-decoration:none;
    }
    .brand span { color:var(--blue); }
    .key-badge {
      display:flex; align-items:center; gap:6px;
      font-size:13px; padding:4px 10px; border-radius:20px;
      border:1px solid var(--border); cursor:pointer; background:var(--bg-soft);
      transition:border-color .15s;
    }
    .key-badge:hover { border-color:var(--text-faint); }
    .key-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .key-dot.on { background:var(--green); }
    .key-dot.off { background:var(--text-faint); }
    .topbar-right { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-faint); }
    .topbar-right span { padding:2px 8px; border:1px solid var(--border); border-radius:4px; font-family:var(--font-code); font-size:12px; }

    /* ====== KEY SETUP PANEL ====== */
    .key-panel {
      display:none; padding:14px 24px; border-bottom:1px solid var(--border);
      background:var(--blue-bg); gap:12px; align-items:flex-end; flex-wrap:wrap;
    }
    .key-panel.show { display:flex; }
    .field-inline { display:flex; flex-direction:column; gap:4px; }
    .field-inline label { font-size:12px; font-weight:600; color:var(--text-soft); text-transform:uppercase; letter-spacing:.04em; }
    .field-inline input {
      padding:8px 12px; border:1.5px solid var(--border); border-radius:var(--radius-sm);
      background:var(--bg); color:var(--text); font-family:var(--font-code); font-size:14px;
      outline:none; width:220px; transition:border-color .15s;
    }
    .field-inline input:focus { border-color:var(--blue); }
    .field-inline input::placeholder { color:var(--text-faint); }
    .btn {
      padding:8px 18px; border-radius:var(--radius-sm); font-size:14px; font-weight:600;
      font-family:var(--font-ui); cursor:pointer; border:none; transition:all .15s;
      white-space:nowrap;
    }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .btn-blue { background:var(--blue); color:#fff; }
    .btn-blue:hover:not(:disabled) { background:#1d4ed8; }
    .btn-ghost { background:transparent; border:1.5px solid var(--border); color:var(--text-soft); }
    .btn-ghost:hover:not(:disabled) { border-color:var(--blue); color:var(--blue); }

    /* ====== MAIN CONTENT ====== */
    .main { max-width:900px; margin:0 auto; padding:28px 24px 60px; }

    /* Prompt hero */
    .prompt-hero {
      background:var(--bg); border:2px solid var(--border); border-radius:var(--radius);
      padding:20px 24px 16px; transition:border-color .2s; margin-bottom:28px;
    }
    .prompt-hero:focus-within { border-color:var(--blue); }
    .prompt-hero textarea {
      width:100%; min-height:80px; border:none; resize:vertical;
      font-family:var(--font-ui); font-size:18px; color:var(--text);
      line-height:1.6; outline:none; background:transparent;
    }
    .prompt-hero textarea::placeholder { color:var(--text-faint); }
    .prompt-footer {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-top:12px; padding-top:12px; border-top:1px solid var(--border);
      flex-wrap:wrap;
    }
    .prompt-footer .pass-field { display:flex; align-items:center; gap:8px; }
    .prompt-footer .pass-field input {
      width:160px; padding:7px 10px; border:1.5px solid var(--border);
      border-radius:var(--radius-sm); font-family:var(--font-code); font-size:13px;
      background:var(--bg-soft); outline:none;
    }
    .prompt-footer .pass-field input:focus { border-color:var(--blue); }
    .btn-run {
      padding:10px 28px; border-radius:var(--radius-sm); font-size:16px; font-weight:600;
      font-family:var(--font-ui); cursor:pointer; border:none; background:var(--text);
      color:#fff; transition:all .15s;
    }
    .btn-run:hover:not(:disabled) { background:#000; }
    .btn-run:disabled { background:var(--text-faint); }

    /* ====== RESULTS ====== */
    .results { display:flex; flex-direction:column; gap:16px; }

    .msg {
      display:flex; gap:14px; padding:20px; border-radius:var(--radius);
      background:var(--bg-soft); border:1px solid var(--border);
    }
    .msg-avatar {
      width:36px; height:36px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-code); font-size:14px; font-weight:700;
    }
    .msg.agent .msg-avatar { background:var(--blue-bg); color:var(--blue); }
    .msg.user  .msg-avatar { background:var(--bg); color:var(--text-soft); border:1.5px solid var(--border); }
    .msg-body { flex:1; line-height:1.65; overflow:hidden; }
    .msg-body p { margin-bottom:8px; }
    .msg-body p:last-child { margin-bottom:0; }

    /* Code block */
    .code-block {
      margin:8px 0; border:1.5px solid var(--border); border-radius:var(--radius-sm);
      overflow:hidden;
    }
    .code-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:6px 14px; background:var(--bg-soft); border-bottom:1px solid var(--border);
      font-size:12px; font-family:var(--font-code); color:var(--text-soft);
    }
    .code-header .lang { color:var(--text-faint); }
    .code-body {
      padding:14px 16px; background:var(--bg-code); overflow-x:auto;
      font-family:var(--font-code); font-size:14px; line-height:1.55; white-space:pre;
    }

    /* Validation block */
    .val-block {
      margin:8px 0; padding:12px 16px; border-radius:var(--radius-sm);
      font-size:14px; display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    }
    .val-block.pass { background:var(--green-bg); color:var(--green); border:1px solid #bbf7d0; }
    .val-block.fail { background:var(--amber-bg); color:var(--amber); border:1px solid #fde68a; }
    .val-item { font-family:var(--font-code); font-size:13px; }
    .val-item .label { opacity:.7; }

    /* Guard block */
    .guard-block {
      margin:8px 0; padding:10px 14px; border-radius:var(--radius-sm);
      background:var(--red-bg); color:var(--red); font-size:14px;
      border:1px solid #fecaca; font-weight:500;
    }

    /* Tool row */
    .tool-row {
      display:flex; align-items:center; gap:10px;
      font-size:13px; font-family:var(--font-code); color:var(--purple);
      padding:6px 0;
    }
    .tool-row .name { font-weight:600; }

    /* Summary bar */
    .summary-bar {
      display:flex; align-items:center; gap:16px; padding:14px 20px;
      border-radius:var(--radius); font-size:14px; font-weight:600;
      flex-wrap:wrap;
    }
    .summary-bar.success { background:var(--green-bg); color:var(--green); border:1px solid #bbf7d0; }
    .summary-bar.fail    { background:var(--red-bg); color:var(--red); border:1px solid #fecaca; }
    .summary-stat { font-family:var(--font-code); font-size:13px; }

    /* Empty */
    .empty-results {
      text-align:center; padding:40px 20px; color:var(--text-faint);
    }
    .empty-results .title { font-size:16px; font-weight:600; margin-bottom:8px; }
    .empty-results .desc { font-size:14px; line-height:1.6; max-width:400px; margin:0 auto; }

    @media (max-width:640px) {
      .main { padding:16px 12px 40px; }
      .prompt-hero textarea { font-size:16px; min-height:60px; }
      .msg { flex-direction:column; gap:8px; }
    }
  </style>
</head>
<body>

  <!-- ====== TOP BAR ====== -->
  <div class="topbar">
    <div class="topbar-left">
      <a class="brand" href="/">Rrrat<span>Coder</span></a>
      <div class="key-badge" id="key-badge" onclick="toggleKeyPanel()" title="API Key settings">
        <span class="key-dot off" id="key-dot"></span>
        <span id="key-label">No API Key</span>
      </div>
    </div>
    <div class="topbar-right">
      <span>v1.0.0</span>
      <span>56 tests</span>
      <span>DeepSeek</span>
    </div>
  </div>

  <!-- ====== KEY SETUP PANEL ====== -->
  <div class="key-panel" id="key-panel">
    <div class="field-inline">
      <label>Master Password</label>
      <input type="password" id="key-password" placeholder="Encryption passphrase" autocomplete="off">
    </div>
    <div class="field-inline">
      <label>DeepSeek API Key</label>
      <input type="password" id="key-apikey" placeholder="sk-..." autocomplete="off">
    </div>
    <button class="btn btn-blue" id="btn-store" onclick="storeKey()">Save Key</button>
    <button class="btn btn-ghost" onclick="clearKey()">Clear</button>
  </div>

  <!-- ====== MAIN ====== -->
  <div class="main">

    <!-- Prompt Hero -->
    <div class="prompt-hero">
      <textarea id="prompt" placeholder="What do you want to build?

Describe your coding task, e.g.:
Create a TypeScript utility that validates email addresses
Write a simple Express API with two endpoints
Fix the type errors in src/utils.ts" rows="3"></textarea>
      <div class="prompt-footer">
        <div class="pass-field">
          <input type="password" id="task-password" placeholder="Master password" autocomplete="off">
        </div>
        <button class="btn-run" id="btn-run" disabled onclick="runTask()">Generate</button>
      </div>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <div class="empty-results">
        <div class="title">Your generated code will appear here</div>
        <div class="desc">
          Configure your DeepSeek API Key above, type a prompt, and click Generate.
          The agent will write files, run validation, and auto-correct errors.
        </div>
      </div>
    </div>

  </div>

<script>
var keyOk = false;

function $(id) { return document.getElementById(id); }

// ===== KEY PANEL =====
function toggleKeyPanel() {
  $('key-panel').classList.toggle('show');
}

async function refreshKey() {
  try {
    var r = await fetch('/api/key/status');
    var d = await r.json();
    keyOk = d.configured;
    $('key-dot').className = 'key-dot ' + (keyOk ? 'on' : 'off');
    $('key-label').textContent = keyOk ? 'API Key Ready' : 'No API Key';
    $('btn-run').disabled = !keyOk;
  } catch(e) {
    $('key-label').textContent = 'Server offline';
  }
}

async function storeKey() {
  var pw = $('key-password').value;
  var key = $('key-apikey').value.trim();
  if (!pw || !key) return;
  $('btn-store').disabled = true;
  $('btn-store').textContent = 'Saving...';
  try {
    var r = await fetch('/api/key/set', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password:pw, apiKey:key})
    });
    var d = await r.json();
    if (d.ok) {
      $('key-password').value = '';
      $('key-apikey').value = '';
      $('key-panel').classList.remove('show');
      refreshKey();
    } else {
      alert(d.error);
    }
  } catch(e) { alert('Error: '+e.message); }
  $('btn-store').disabled = false;
  $('btn-store').textContent = 'Save Key';
}

async function clearKey() {
  if (!confirm('Delete stored API key?')) return;
  try {
    var r = await fetch('/api/key/clear', { method:'POST' });
    var d = await r.json();
    refreshKey();
  } catch(e) {}
}

// ===== RUN TASK =====
async function runTask() {
  var task = $('prompt').value.trim();
  var pw = $('task-password').value;
  if (!task || !pw) return;

  var btn = $('btn-run');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  // Show loading
  $('results').innerHTML =
    '<div class="msg agent">' +
      '<div class="msg-avatar">RC</div>' +
      '<div class="msg-body"><p>Working on your request...</p></div>' +
    '</div>';

  try {
    var r = await fetch('/api/run', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({task:task, password:pw})
    });
    var d = await r.json();
    if (d.ok) {
      renderResult(task, d.result);
    } else {
      $('results').innerHTML =
        '<div class="msg agent"><div class="msg-avatar" style="background:var(--red-bg);color:var(--red);">!!</div>' +
        '<div class="msg-body"><p style="color:var(--red);">Error: ' + escapeHtml(d.error) + '</p></div></div>';
    }
  } catch(e) {
    $('results').innerHTML =
      '<div class="msg agent"><div class="msg-avatar" style="background:var(--red-bg);color:var(--red);">!!</div>' +
      '<div class="msg-body"><p style="color:var(--red);">Network error: ' + e.message + '</p></div></div>';
  }

  btn.disabled = !keyOk;
  btn.textContent = 'Generate';
  $('task-password').value = '';
}

// ===== RENDER =====
function renderResult(task, result) {
  var html = '';

  // Echo user prompt
  html += '<div class="msg user">' +
    '<div class="msg-avatar">You</div>' +
    '<div class="msg-body"><p>' + escapeHtml(task) + '</p></div>' +
  '</div>';

  var log = result.sessionLog || [];

  log.forEach(function(rec) {
    // LLM text response
    if (rec.llmResponse && rec.llmResponse.message && rec.llmResponse.message.content) {
      var text = rec.llmResponse.message.content.trim();
      if (text) {
        html += '<div class="msg agent">' +
          '<div class="msg-avatar">RC</div>' +
          '<div class="msg-body"><p>' + escapeHtml(text) + '</p></div>' +
        '</div>';
      }
    }

    // Tool call
    if (rec.toolCall) {
      var tc = rec.toolCall;
      var name = tc.function.name;
      var args = {};
      try { args = JSON.parse(tc.function.arguments); } catch(e) {}

      // write_file: show the code
      if (name === 'write_file' && args.path && args.content) {
        var lang = '';
        var ext = (args.path || '').split('.').pop();
        if (ext === 'ts') lang = 'TypeScript';
        else if (ext === 'js') lang = 'JavaScript';
        else if (ext === 'json') lang = 'JSON';
        else if (ext === 'md') lang = 'Markdown';
        else if (ext === 'html') lang = 'HTML';
        else if (ext === 'css') lang = 'CSS';
        html += '<div class="code-block">' +
          '<div class="code-header">' +
            '<span>' + escapeHtml(args.path) + '</span>' +
            '<span class="lang">' + (lang || ext) + '</span>' +
          '</div>' +
          '<div class="code-body">' + escapeHtml(args.content) + '</div>' +
        '</div>';
      }
      // shell: show command + output
      else if (name === 'shell' && args.command) {
        html += '<div class="code-block">' +
          '<div class="code-header">' +
            '<span>Shell</span><span class="lang">$</span>' +
          '</div>' +
          '<div class="code-body">$ ' + escapeHtml(args.command) + '</div>' +
        '</div>';
        if (rec.toolResult && rec.toolResult.output) {
          html += '<div class="code-block" style="margin-top:4px;">' +
            '<div class="code-header"><span>Output</span></div>' +
            '<div class="code-body">' + escapeHtml(rec.toolResult.output) + '</div>' +
          '</div>';
        }
      }
      // Other tools
      else {
        html += '<div class="tool-row">' +
          '<span class="name">' + name + '</span>' +
          (args.path ? ' ' + escapeHtml(args.path) : '') +
        '</div>';
        if (rec.toolResult && rec.toolResult.output && name !== 'write_file') {
          var out = rec.toolResult.output;
          if (out.length < 500) {
            html += '<div class="code-block" style="margin-top:4px;">' +
              '<div class="code-body">' + escapeHtml(out) + '</div>' +
            '</div>';
          }
        }
      }

      // Tool error
      if (rec.toolResult && !rec.toolResult.success && rec.toolResult.error) {
        html += '<div class="guard-block">' +
          'Tool error: ' + escapeHtml(rec.toolResult.error) +
        '</div>';
      }
    }

    // Guardrail block
    if (rec.guardResult && !rec.guardResult.allowed) {
      html += '<div class="guard-block">' +
        'Blocked: ' + escapeHtml(rec.guardResult.reason || '') +
        ' (Risk: ' + (rec.guardResult.risk || '') + ')' +
      '</div>';
    }

    // Validation
    if (rec.feedbackResult) {
      var fb = rec.feedbackResult;
      html += '<div class="val-block ' + (fb.passed ? 'pass' : 'fail') + '">' +
        '<span style="font-weight:600;">' + (fb.passed ? 'Validation passed' : 'Validation failed - retrying') + '</span>';
      if (fb.errors && fb.errors.length) {
        fb.errors.forEach(function(e) {
          html += '<span class="val-item"><span class="label">' + e.category + '</span> ' +
            escapeHtml(e.message) + '</span>';
        });
      }
      html += '</div>';
    }
  });

  // Summary
  var cls = result.status === 'success' ? 'success' : 'fail';
  html += '<div class="summary-bar ' + cls + '">' +
    '<span>' + (result.status === 'success' ? 'Task completed' : 'Task ended') + '</span>' +
    '<span class="summary-stat">Status: ' + result.status + '</span>' +
    '<span class="summary-stat">Rounds: ' + result.rounds + '</span>' +
    '<span class="summary-stat">' + (result.summary || '') + '</span>' +
  '</div>';

  $('results').innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== INIT =====
refreshKey();
</script>
</body>
</html>
